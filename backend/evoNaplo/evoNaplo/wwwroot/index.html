<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Students Updater</title>
</head>
<body>
  <h1>Students Updater</h1>
  <label for="studentId">Student ID:</label>
  <input id="studentId" type="number" />
  <br />
  <label for="field">Field:</label>
  <select id="field">
    <option value="name">Name</option>
    <option value="email">Email</option>
    <option value="phone">Phone</option>
    <option value="studies">CurrentStudies</option>
    <option value="goals">PersonalGoals</option>
    <option value="firstSemester">IsFirstSemester</option>
    <option value="stayWithTeam">StayWithCurrentTeam</option>
  </select>
  <br />
  <label for="value">Value:</label>
  <input id="value" type="text" />
  <br />
  <button id="updateBtn">Update</button>

  <script>
    async function update() {
      const id = document.getElementById('studentId').value;
      const field = document.getElementById('field').value;
      let value = document.getElementById('value').value;

      if (!id) { alert('Enter id'); return; }

      let url = `/students/${id}/${field}`;
      // booleans need parsing
      if (field === 'firstSemester' || field === 'stayWithTeam') {
        value = value.toLowerCase() === 'true';
      }

      const res = await fetch(url, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(value)
      });

      if (res.status === 204) alert('Updated'); else alert('Failed: ' + res.status);
    }

    document.getElementById('updateBtn').addEventListener('click', update);
  </script>
</body>
</html>
